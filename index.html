<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./src/index.css" />
    <script>
      window.__MONACO_CDN__ = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min';
      window.MonacoEnvironment = {
        getWorkerUrl: function () {
          const base = window.__MONACO_CDN__;
          const proxy = `self.MonacoEnvironment = { baseUrl: '${base}/' };\nimportScripts('${base}/vs/base/worker/workerMain.js');`;
          return 'data:text/javascript;charset=utf-8,' + encodeURIComponent(proxy);
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <script>
      window.__monacoReady = new Promise(function (resolve, reject) {
        if (typeof window.require !== 'function') {
          reject(new Error('Monaco AMD loader failed to load from CDN'));
          return;
        }
        window.require.config({ paths: { vs: window.__MONACO_CDN__ + '/vs' } });
        window.require(['vs/editor/editor.main'], function () {
          resolve(window.monaco);
        });
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
